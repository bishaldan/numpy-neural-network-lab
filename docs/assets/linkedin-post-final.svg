<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" width="1200" height="627">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1120" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&amp;display=swap');

      text {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }

      .network-group {
        animation: float 6s ease-in-out infinite;
      }

      .node {
        transform-origin: center;
        animation: pulse 3s infinite alternate ease-in-out;
      }
      .node-layer-1 { animation-delay: 0s; }
      .node-layer-2 { animation-delay: 1s; }
      .node-layer-3 { animation-delay: 2s; }

      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
        100% { transform: translateY(0px); }
      }

      @keyframes pulse {
        0% { r: 14; opacity: 0.85; filter: none; }
        100% { r: 17; opacity: 1; filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.6)); }
      }

      .data-flow {
        stroke: #38BDF8;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-dasharray: 15, 300;
        opacity: 0;
      }

      .flow-1 { animation: flowAnim 2.5s linear infinite 0.2s; }
      .flow-2 { animation: flowAnim 2.2s linear infinite 1.5s; }
      .flow-3 { animation: flowAnim 2.8s linear infinite 0.7s; }
      .flow-4 { animation: flowAnim 2.0s linear infinite 2.1s; }
      .flow-5 { animation: flowAnim 2.6s linear infinite 1.1s; }

      @keyframes flowAnim {
        0% { stroke-dashoffset: 250; opacity: 1; filter: drop-shadow(0 0 4px #38BDF8); }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1200" height="627" fill="url(#bgGrad)" />

  <g stroke="rgba(255,255,255,0.02)" stroke-width="1">
    <line x1="80" y1="0" x2="80" y2="627" />
    <line x1="320" y1="0" x2="320" y2="627" />
    <line x1="560" y1="0" x2="560" y2="627" />
    <line x1="0" y1="480" x2="1200" y2="480" />
  </g>

  <text x="80" y="140" font-size="56" font-weight="700" fill="#F3F4F6" letter-spacing="-1">Building a handwritten</text>
  <text x="80" y="205" font-size="56" font-weight="700" fill="#38BDF8" letter-spacing="-1">digit classifier <tspan fill="#F3F4F6">with NumPy</tspan></text>

  <text x="80" y="285" font-size="24" font-weight="400" fill="#9CA3AF" line-height="1.5">Forward pass, ReLU, softmax,</text>
  <text x="80" y="325" font-size="24" font-weight="400" fill="#9CA3AF">backpropagation, and gradient</text>
  <text x="80" y="365" font-size="24" font-weight="400" fill="#9CA3AF">descent — built from scratch.</text>

  <text x="80" y="445" font-size="18" font-weight="300" fill="#6B7280">A simple neural network project with training, experiments,</text>
  <text x="80" y="475" font-size="18" font-weight="300" fill="#6B7280">inference, Docker, and a small demo.</text>

  <rect x="80" y="520" width="220" height="75" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <text x="105" y="550" font-size="13" font-weight="600" fill="#9CA3AF" text-transform="uppercase" letter-spacing="1">Model core</text>
  <text x="105" y="578" font-size="20" font-weight="700" fill="#F3F4F6">NumPy only</text>

  <rect x="320" y="520" width="220" height="75" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <text x="345" y="550" font-size="13" font-weight="600" fill="#9CA3AF" text-transform="uppercase" letter-spacing="1">Showcase run</text>
  <text x="345" y="578" font-size="20" font-weight="700" fill="#F3F4F6">95.78% MNIST</text>

  <rect x="560" y="520" width="220" height="75" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <text x="585" y="550" font-size="13" font-weight="600" fill="#9CA3AF" text-transform="uppercase" letter-spacing="1">Workflow</text>
  <text x="585" y="578" font-size="20" font-weight="700" fill="#F3F4F6">Train + demo</text>

  <text x="1120" y="565" font-size="14" font-weight="400" fill="#4B5563" text-anchor="end">github.com/bishaldan/numpy-neural-network-lab</text>

  <g class="network-group">
    <g stroke="rgba(255,255,255,0.08)" stroke-width="2">
      <line x1="840" y1="213" x2="970" y2="143" />
      <line x1="840" y1="213" x2="970" y2="233" />
      <line x1="840" y1="213" x2="970" y2="323" />
      <line x1="840" y1="213" x2="970" y2="413" />
      <line x1="840" y1="283" x2="970" y2="143" />
      <line x1="840" y1="283" x2="970" y2="233" />
      <line x1="840" y1="283" x2="970" y2="323" />
      <line x1="840" y1="283" x2="970" y2="413" />
      <line x1="840" y1="353" x2="970" y2="143" />
      <line x1="840" y1="353" x2="970" y2="233" />
      <line x1="840" y1="353" x2="970" y2="323" />
      <line x1="840" y1="353" x2="970" y2="413" />

      <line x1="970" y1="143" x2="1100" y2="243" />
      <line x1="970" y1="143" x2="1100" y2="323" />
      <line x1="970" y1="233" x2="1100" y2="243" />
      <line x1="970" y1="233" x2="1100" y2="323" />
      <line x1="970" y1="323" x2="1100" y2="243" />
      <line x1="970" y1="323" x2="1100" y2="323" />
      <line x1="970" y1="413" x2="1100" y2="243" />
      <line x1="970" y1="413" x2="1100" y2="323" />
    </g>

    <line x1="840" y1="283" x2="970" y2="233" class="data-flow flow-1" />
    <line x1="840" y1="213" x2="970" y2="323" class="data-flow flow-2" />
    <line x1="840" y1="353" x2="970" y2="413" class="data-flow flow-3" />
    <line x1="970" y1="233" x2="1100" y2="243" class="data-flow flow-4" />
    <line x1="970" y1="323" x2="1100" y2="323" class="data-flow flow-5" />

    <circle cx="840" cy="213" r="14" fill="#1E293B" stroke="#475569" stroke-width="2" class="node node-layer-1" />
    <circle cx="840" cy="283" r="14" fill="#1E293B" stroke="#475569" stroke-width="2" class="node node-layer-1" />
    <circle cx="840" cy="353" r="14" fill="#1E293B" stroke="#475569" stroke-width="2" class="node node-layer-1" />

    <circle cx="970" cy="143" r="14" fill="#334155" stroke="#38BDF8" stroke-width="2" class="node node-layer-2" />
    <circle cx="970" cy="233" r="14" fill="#334155" stroke="#38BDF8" stroke-width="2" class="node node-layer-2" />
    <circle cx="970" cy="323" r="14" fill="#334155" stroke="#38BDF8" stroke-width="2" class="node node-layer-2" />
    <circle cx="970" cy="413" r="14" fill="#334155" stroke="#38BDF8" stroke-width="2" class="node node-layer-2" />

    <circle cx="1100" cy="243" r="14" fill="#064E3B" stroke="#34D399" stroke-width="2" class="node node-layer-3" />
    <circle cx="1100" cy="323" r="14" fill="#064E3B" stroke="#34D399" stroke-width="2" class="node node-layer-3" />
  </g>
</svg>
