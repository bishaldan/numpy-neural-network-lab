<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" width="1200" height="627">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      text {
        font-family: Inter, Arial, Helvetica, sans-serif;
      }

      .node {
        transform-origin: center;
        animation: pulse 3s infinite alternate ease-in-out;
      }
      .node-layer-1 { animation-delay: 0s; }
      .node-layer-2 { animation-delay: 1s; }
      .node-layer-3 { animation-delay: 2s; }

      @keyframes pulse {
        0% { r: 16; opacity: 0.8; filter: none; }
        100% { r: 19; opacity: 1; filter: drop-shadow(0 0 6px rgba(100, 255, 218, 0.5)); }
      }

      .data-flow {
        stroke: #64ffda;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-dasharray: 20, 300;
        opacity: 0;
      }

      .flow-1 { animation: flowAnim 2.5s linear infinite 0.2s; }
      .flow-2 { animation: flowAnim 2.2s linear infinite 1.5s; }
      .flow-3 { animation: flowAnim 2.8s linear infinite 0.7s; }
      .flow-4 { animation: flowAnim 2.0s linear infinite 2.1s; }
      .flow-5 { animation: flowAnim 2.6s linear infinite 1.1s; }

      @keyframes flowAnim {
        0% { stroke-dashoffset: 250; opacity: 1; }
        80% { opacity: 1; filter: drop-shadow(0 0 4px #64ffda); }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1200" height="627" fill="url(#bgGrad)" />

  <text x="80" y="140" font-size="52" font-weight="700" fill="#f8fafc">Building a handwritten</text>
  <text x="80" y="200" font-size="52" font-weight="700" fill="#f8fafc">digit classifier with NumPy</text>

  <text x="80" y="280" font-size="26" font-weight="400" fill="#cbd5e1">Forward pass, ReLU, softmax,</text>
  <text x="80" y="320" font-size="26" font-weight="400" fill="#cbd5e1">backpropagation, and gradient</text>
  <text x="80" y="360" font-size="26" font-weight="400" fill="#cbd5e1">descent - built from scratch.</text>

  <text x="80" y="440" font-size="20" font-weight="400" fill="#94a3b8">A simple neural network project with training,</text>
  <text x="80" y="470" font-size="20" font-weight="400" fill="#94a3b8">experiments, inference, Docker, and a small demo.</text>

  <rect x="80" y="510" width="180" height="70" rx="8" fill="#334155" opacity="0.4" />
  <text x="100" y="535" font-size="14" font-weight="600" fill="#94a3b8">Model core</text>
  <text x="100" y="565" font-size="22" font-weight="700" fill="#f8fafc">NumPy only</text>

  <rect x="280" y="510" width="220" height="70" rx="8" fill="#334155" opacity="0.4" />
  <text x="300" y="535" font-size="14" font-weight="600" fill="#94a3b8">Showcase run</text>
  <text x="300" y="565" font-size="22" font-weight="700" fill="#f8fafc">95.78% MNIST</text>

  <rect x="520" y="510" width="180" height="70" rx="8" fill="#334155" opacity="0.4" />
  <text x="540" y="535" font-size="14" font-weight="600" fill="#94a3b8">Workflow</text>
  <text x="540" y="565" font-size="22" font-weight="700" fill="#f8fafc">Train + demo</text>

  <text x="80" y="605" font-size="15" font-weight="400" fill="#64748b">github.com/bishaldan/numpy-neural-network-lab</text>

  <g id="neural-network">
    <g stroke="#334155" stroke-width="2" opacity="0.6">
      <line x1="750" y1="213" x2="925" y2="163" />
      <line x1="750" y1="213" x2="925" y2="263" />
      <line x1="750" y1="213" x2="925" y2="363" />
      <line x1="750" y1="213" x2="925" y2="463" />
      <line x1="750" y1="313" x2="925" y2="163" />
      <line x1="750" y1="313" x2="925" y2="263" />
      <line x1="750" y1="313" x2="925" y2="363" />
      <line x1="750" y1="313" x2="925" y2="463" />
      <line x1="750" y1="413" x2="925" y2="163" />
      <line x1="750" y1="413" x2="925" y2="263" />
      <line x1="750" y1="413" x2="925" y2="363" />
      <line x1="750" y1="413" x2="925" y2="463" />

      <line x1="925" y1="163" x2="1100" y2="263" />
      <line x1="925" y1="163" x2="1100" y2="363" />
      <line x1="925" y1="263" x2="1100" y2="263" />
      <line x1="925" y1="263" x2="1100" y2="363" />
      <line x1="925" y1="363" x2="1100" y2="263" />
      <line x1="925" y1="363" x2="1100" y2="363" />
      <line x1="925" y1="463" x2="1100" y2="263" />
      <line x1="925" y1="463" x2="1100" y2="363" />
    </g>

    <line x1="750" y1="313" x2="925" y2="263" class="data-flow flow-1" />
    <line x1="750" y1="213" x2="925" y2="363" class="data-flow flow-2" />
    <line x1="750" y1="413" x2="925" y2="463" class="data-flow flow-3" />
    <line x1="925" y1="263" x2="1100" y2="263" class="data-flow flow-4" />
    <line x1="925" y1="363" x2="1100" y2="363" class="data-flow flow-5" />

    <circle cx="750" cy="213" r="16" fill="#818cf8" class="node node-layer-1" />
    <circle cx="750" cy="313" r="16" fill="#818cf8" class="node node-layer-1" />
    <circle cx="750" cy="413" r="16" fill="#818cf8" class="node node-layer-1" />

    <circle cx="925" cy="163" r="16" fill="#94a3b8" class="node node-layer-2" />
    <circle cx="925" cy="263" r="16" fill="#94a3b8" class="node node-layer-2" />
    <circle cx="925" cy="363" r="16" fill="#94a3b8" class="node node-layer-2" />
    <circle cx="925" cy="463" r="16" fill="#94a3b8" class="node node-layer-2" />

    <circle cx="1100" cy="263" r="16" fill="#64ffda" class="node node-layer-3" />
    <circle cx="1100" cy="363" r="16" fill="#64ffda" class="node node-layer-3" />
  </g>
</svg>
